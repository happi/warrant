name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for tags and release notes

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Generate warrant-based release notes
      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            ./client/bin/warrant release-notes --since "$PREV_TAG" -o RELEASE_NOTES.md
          else
            ./client/bin/warrant release-notes -o RELEASE_NOTES.md
          fi

      # Build VS Code extension
      - name: Install extension dependencies
        working-directory: vscode
        run: npm ci

      - name: Package extension
        working-directory: vscode
        run: npx @vscode/vsce package -o ../warrant-vscode-${{ github.ref_name }}.vsix

      # Package CLI
      - name: Package CLI
        run: |
          tar czf warrant-cli-${{ github.ref_name }}.tar.gz \
            -C client \
            bin/ hooks/ ci/ .env.example SETUP.md

      # Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            warrant-vscode-${{ github.ref_name }}.vsix
            warrant-cli-${{ github.ref_name }}.tar.gz
